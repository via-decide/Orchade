name: Refactor
description: Improve structure without behavior change
labels: [Refactor]
body:
  - type: textarea
    id: reason
    attributes: { label: Reason, description: What maintenance cost is reduced? }
    validations: { required: true }
  - type: textarea
    id: scope
    attributes: { label: Scope, description: What files/systems change? }
  - type: checkboxes
    id: behavior
    attributes:
      label: Behavior compatibility
      options:
        - label: This should not change gameplay behavior.
          required: true
