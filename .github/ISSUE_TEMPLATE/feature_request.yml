name: Feature request
description: Propose user-facing functionality
labels: [Gameplay]
body:
  - type: textarea
    id: value
    attributes: { label: User value, description: What outcome should this create? }
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes: { label: Proposed solution }
  - type: textarea
    id: risks
    attributes: { label: Risks and tradeoffs }
