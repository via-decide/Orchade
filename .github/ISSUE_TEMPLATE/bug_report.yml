name: Bug report
description: Report broken behavior or regression
labels: [Bug]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem, description: What broke? }
    validations: { required: true }
  - type: textarea
    id: steps
    attributes: { label: Reproduction steps, description: How can we reproduce it? }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
  - type: textarea
    id: systems
    attributes: { label: Systems affected }
