name: Technical debt
description: Track maintenance risks and cleanup
labels: [Technical debt]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Critical, High Priority, Medium, Low]
    validations: { required: true }
  - type: textarea
    id: debt
    attributes: { label: Debt description }
    validations: { required: true }
  - type: textarea
    id: impact
    attributes: { label: Impact if not fixed }
