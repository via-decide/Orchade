name: Repository Intelligence

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  repository-intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs:generate
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=high
      - run: npx --yes markdown-link-check README.md docs/*.md gameplay/*/*.md
