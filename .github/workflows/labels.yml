name: Sync Labels

on:
  workflow_dispatch:
  push:
    paths:
      - .github/labels.yml

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const labelsText = fs.readFileSync('.github/labels.yml', 'utf8');
            const labels = [...labelsText.matchAll(/- name: (.+)\n  color: (.+)\n  description: (.+)/g)]
              .map((match) => ({
                name: match[1].trim(),
                color: match[2].trim(),
                description: match[3].trim(),
              }));
            if (labels.length === 0) {
              throw new Error('No labels found in .github/labels.yml');
            }
            for (const label of labels) {
              try {
                await github.rest.issues.updateLabel({ ...context.repo, name: label.name, color: label.color, description: label.description });
              } catch (error) {
                if (error.status === 404) await github.rest.issues.createLabel({ ...context.repo, ...label });
                else throw error;
              }
            }
